command     = "docker"

[[flags]]
long        = "config"
description = "Location of client config files (default"

[[flags]]
long        = "context"
short       = "c"
description = "Name of the context to use to connect to the"

[[flags]]
long        = "debug"
short       = "D"
description = "Enable debug mode"

[[flags]]
long        = "host"
short       = "H"
description = "Daemon socket to connect to"

[[flags]]
long        = "log-level"
short       = "l"
description = "Set the logging level (\"debug\", \"info\","

[[flags]]
long        = "tls"
description = "Use TLS; implied by --tlsverify"

[[flags]]
long        = "tlscacert"
description = "Trust certs signed only by this CA (default"

[[flags]]
long        = "tlscert"
description = "Path to TLS certificate file (default"

[[flags]]
long        = "tlskey"
description = "Path to TLS key file (default"

[[flags]]
long        = "tlsverify"
description = "Use TLS and verify the remote"

[[flags]]
long        = "version"
short       = "v"
description = "Print version information and quit"

[[subcommands]]
name        = "attach"
description = "Attach local standard input, output, and error streams to a running container"

[[subcommands]]
name        = "commit"
description = "Create a new image from a container's changes"

[[subcommands]]
name        = "cp"
description = "Copy files/folders between a container and the local filesystem"

[[subcommands]]
name        = "create"
description = "Create a new container"

[[subcommands]]
name        = "diff"
description = "Inspect changes to files or directories on a container's filesystem"

[[subcommands]]
name        = "events"
description = "Get real time events from the server"

[[subcommands]]
name        = "export"
description = "Export a container's filesystem as a tar archive"

[[subcommands]]
name        = "history"
description = "Show the history of an image"

[[subcommands]]
name        = "import"
description = "Import the contents from a tarball to create a filesystem image"

[[subcommands]]
name        = "inspect"
description = "Return low-level information on Docker objects"

[[subcommands]]
name        = "kill"
description = "Kill one or more running containers"

[[subcommands]]
name        = "load"
description = "Load an image from a tar archive or STDIN"

[[subcommands]]
name        = "logs"
description = "Fetch the logs of a container"

[[subcommands]]
name        = "pause"
description = "Pause all processes within one or more containers"

[[subcommands]]
name        = "port"
description = "List port mappings or a specific mapping for the container"

[[subcommands]]
name        = "rename"
description = "Rename a container"

[[subcommands]]
name        = "restart"
description = "Restart one or more containers"

[[subcommands]]
name        = "rm"
description = "Remove one or more containers"

[[subcommands]]
name        = "rmi"
description = "Remove one or more images"

[[subcommands]]
name        = "save"
description = "Save one or more images to a tar archive (streamed to STDOUT by default)"

[[subcommands]]
name        = "start"
description = "Start one or more stopped containers"

[[subcommands]]
name        = "stats"
description = "Display a live stream of container(s) resource usage statistics"

[[subcommands]]
name        = "stop"
description = "Stop one or more running containers"

[[subcommands]]
name        = "tag"
description = "Create a tag TARGET_IMAGE that refers to SOURCE_IMAGE"

[[subcommands]]
name        = "top"
description = "Display the running processes of a container"

[[subcommands]]
name        = "unpause"
description = "Unpause all processes within one or more containers"

[[subcommands]]
name        = "update"
description = "Update configuration of one or more containers"

[[subcommands]]
name        = "wait"
description = "Block until one or more containers stop, then print their exit codes"

