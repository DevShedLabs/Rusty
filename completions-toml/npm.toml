[[flags]]
long        = "json"
description = "Output as JSON"

[[flags]]
long        = "long"
short       = "l"
description = "Show extended information"

[[flags]]
long        = "parseable"
short       = "p"
description = "Output parseable results from commands that produce output"

[[flags]]
long        = "workspace"
short       = "w"
description = "Enable running a command in the context of a workspace"
