command     = "npm"
description = "JavaScript package manager"

[[flags]]
long        = "version"
short       = "v"
description = "Print npm version"

[[flags]]
long        = "help"
short       = "h"
description = "Show help"

[[flags]]
long        = "global"
short       = "g"
description = "Operate in global mode"

[[flags]]
long        = "save"
short       = "S"
description = "Save to dependencies in package.json"

[[flags]]
long        = "save-dev"
short       = "D"
description = "Save to devDependencies in package.json"

[[flags]]
long        = "save-exact"
short       = "E"
description = "Save exact version instead of semver range"

[[flags]]
long        = "save-optional"
short       = "O"
description = "Save to optionalDependencies in package.json"

[[flags]]
long        = "no-save"
description = "Prevent saving to dependencies"

[[flags]]
long        = "verbose"
description = "Show verbose output"

[[flags]]
long        = "silent"
short       = "s"
description = "Only show errors"

[[flags]]
long        = "dry-run"
description = "Report what would have been done without actually doing it"

[[flags]]
long        = "prefix"
description = "Set the npm prefix"
takes_value = true
value_hint  = "path"

[[flags]]
long        = "registry"
description = "Override registry URL"
takes_value = true
value_hint  = "url"

[[flags]]
long        = "tag"
description = "Tag used when publishing"
takes_value = true
value_hint  = "tag"

[[flags]]
long        = "access"
description = "Publish access level (public or restricted)"
takes_value = true
value_hint  = "level"

[[flags]]
long        = "legacy-peer-deps"
description = "Ignore peer dependency conflicts"

[[flags]]
long        = "force"
