command     = "pac"

[[flags]]
long        = "repo"
description = "Override the repo root path"

[[flags]]
long        = "json"
description = "Output machine-readable JSON"

[[flags]]
long        = "quiet"
description = "Suppress non-error output"

[[flags]]
long        = "help"
short       = "h"
description = "Print help"

[[flags]]
long        = "version"
short       = "V"
description = "Print version"

[[subcommands]]
name        = "init"
description = "Initialize a new PAC repo in the current directory"

[[subcommands]]
name        = "status"
description = "Show current workspace state"

[[subcommands]]
name        = "activity"
description = "Show human-readable work history"

[[subcommands]]
name        = "focus"
description = "Switch or create a work context"

[[subcommands]]
name        = "timeline"
description = "Show and edit the snapshot timeline"

[[subcommands]]
name        = "visibility"
description = "Show effective visibility for paths"

[[subcommands]]
name        = "config"
description = "Show or edit repo configuration"

[[subcommands]]
name        = "start"
description = "Start the PAC daemon"

[[subcommands]]
name        = "stop"
description = "Stop the PAC daemon"

[[subcommands]]
name        = "daemon"
description = "Show daemon status"

[[subcommands]]
name        = "daemons"
description = "Show all running PAC daemons across all projects"

[[subcommands]]
name        = "help"
description = "Print this message or the help of the given subcommand(s)"

